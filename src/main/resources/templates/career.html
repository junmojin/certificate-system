<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hrms :: head('경력 조회')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/hrms :: sidebar-user('career')}"></aside>
    <div class="app-main">
        <header th:replace="~{fragments/hrms :: topbar('경력 조회', 'Personal Career Information')}"></header>
        <main class="app-content">
            <div class="card content-narrow">
                <div class="card-header">
                    <div>
                        <h2>개인 경력 정보</h2>
                        <p class="card-desc">본인 경력을 확인한 뒤 경력증명서를 신청·출력할 수 있습니다.</p>
                    </div>
                </div>
                <table class="info-table">
                    <tr><th>성명</th><td th:text="${name}"></td></tr>
                    <tr><th>사번 / ID</th><td th:text="${userId}"></td></tr>
                    <tr><th>입사일</th><td th:text="${hireDate}"></td></tr>
                    <tr><th>재직 상태</th><td>재직중</td></tr>
                </table>
                <div class="btn-group no-print">
                    <a th:href="@{/certificate}" class="btn btn-primary">경력증명서 신청</a>
                    <a th:href="@{/home}" class="btn btn-secondary">대시보드</a>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
