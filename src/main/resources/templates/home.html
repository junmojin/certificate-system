<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈 - 경력증명서 시스템</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 40px;
        }
        .card {
            background: #fff;
            max-width: 520px;
            margin: 0 auto;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h1 { font-size: 1.3rem; color: #333; margin-bottom: 20px; }
        .info { color: #555; line-height: 1.8; margin-bottom: 24px; }
        .role-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            background: #e8f0fe;
            color: #4a90d9;
        }
        .menu { list-style: none; padding: 0; margin: 0; }
        .menu li { margin-bottom: 10px; }
        .menu a {
            display: block;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 6px;
            color: #333;
            text-decoration: none;
            border: 1px solid #e0e0e0;
        }
        .menu a:hover { background: #e8f0fe; border-color: #4a90d9; }
        .btn-logout {
            margin-top: 24px;
            padding: 9px 20px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-logout:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="card">
        <h1>메인</h1>
        <div class="info">
            <p>이름: <strong th:text="${name}"></strong></p>
            <p>ID: <strong th:text="${userId}"></strong></p>
            <p>권한: <span class="role-badge" th:text="${role}"></span></p>
        </div>

        <ul class="menu">
            <li><a th:href="@{/career}">경력 조회</a></li>
            <li><a th:href="@{/certificate}">경력증명서 신청</a></li>
            <li><a th:href="@{/boards}">게시판</a></li>
            <li th:if="${isAdmin}"><a th:href="@{/admin/activity-logs}">사용자 행위 추적 (관리자)</a></li>
        </ul>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">로그아웃</button>
        </form>
    </div>
</body>
</html>
