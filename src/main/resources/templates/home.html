<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hrms :: head('대시보드')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/hrms :: sidebar-user('home')}"></aside>
    <div class="app-main">
        <header th:replace="~{fragments/hrms :: topbar('대시보드', '직원 Self-Service 포털')}"></header>
        <main class="app-content">
            <div class="dashboard-grid">
                <div class="stat-card">
                    <div class="label">성명</div>
                    <div class="value" th:text="${name}"></div>
                </div>
                <div class="stat-card">
                    <div class="label">사번 / ID</div>
                    <div class="value" th:text="${userId}"></div>
                </div>
                <div class="stat-card">
                    <div class="label">계정 유형</div>
                    <div class="value">직원 (USER)</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div>
                        <h2>업무 메뉴</h2>
                        <p class="card-desc">경력 조회 → 증명서 신청 → 출력 순서로 이용하세요.</p>
                    </div>
                </div>
                <ul class="menu-grid">
                    <li>
                        <a th:href="@{/career}">
                            <span class="menu-icon">☰</span>
                            <span class="menu-text">
                                <strong>경력 조회</strong>
                                <span>본인 재직 정보 확인</span>
                            </span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/certificate}">
                            <span class="menu-icon">📄</span>
                            <span class="menu-text">
                                <strong>증명서 신청</strong>
                                <span>경력증명서 발급 신청</span>
                            </span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/boards}">
                            <span class="menu-icon">💬</span>
                            <span class="menu-text">
                                <strong>건의 게시판</strong>
                                <span>의견·문의 등록</span>
                            </span>
                        </a>
                    </li>
                </ul>
            </div>
        </main>
    </div>
</div>
</body>
</html>
