<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hrms :: head('로그인')}"></head>
<body class="login-page">
    <div class="login-brand">
        <h1>HR Portal</h1>
        <p>경력 조회, 증명서 발급, 건의 게시판까지 — 통합 인사관리 시스템입니다.</p>
        <ul class="features">
            <li>개인 경력 조회 및 증명서 신청</li>
            <li>전자 증명서 발급 및 출력</li>
            <li>건의·문의 게시판</li>
        </ul>
    </div>
    <div class="login-panel">
        <div class="login-box">
            <h2>로그인</h2>
            <p class="sub">사번(ID)과 비밀번호를 입력하세요.</p>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${logout}" class="alert alert-success" th:text="${logout}"></div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <label class="field-label" for="username">사번 / ID</label>
                <input class="field-input" type="text" id="username" name="username"
                       placeholder="아이디 입력" required autocomplete="username">
                <label class="field-label" for="password">비밀번호</label>
                <input class="field-input" type="password" id="password" name="password"
                       placeholder="비밀번호 입력" required autocomplete="current-password">
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:20px;padding:12px;">로그인</button>
            </form>
        </div>
    </div>
</body>
</html>
