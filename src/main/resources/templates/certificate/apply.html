<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hrms :: head('증명서 신청')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/hrms :: sidebar-user('certificate')}"></aside>
    <div class="app-main">
        <header th:replace="~{fragments/hrms :: topbar('경력증명서 신청', 'Certificate Application')}"></header>
        <main class="app-content">
            <div class="two-col content-wide">
                <div class="card">
                    <div class="card-header">
                        <div>
                            <h2>신청서 작성</h2>
                            <p class="card-desc">신청 후 관리자 승인을 받으면 증명서를 인쇄할 수 있습니다.</p>
                        </div>
                    </div>
                    <div class="alert alert-error" th:if="${dbError}" th:text="${dbError}"></div>
                    <table class="info-table">
                        <tr><th>성명</th><td th:text="${name}"></td></tr>
                        <tr><th>사번 / ID</th><td th:text="${userId}"></td></tr>
                        <tr><th>입사일</th><td th:text="${hireDate}"></td></tr>
                        <tr><th>재직 상태</th><td>재직중</td></tr>
                    </table>
                    <form th:action="@{/certificate}" th:object="${certificateApplyRequest}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <label class="field-label" for="companyName">회사명</label>
                        <input class="field-input" type="text" id="companyName" th:field="*{companyName}" placeholder="예: (주)○○○○">
                        <p class="field-error" th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}"></p>
                        <label class="field-label" for="position">직위</label>
                        <input class="field-input" type="text" id="position" th:field="*{position}" placeholder="예: 대리, 과장">
                        <p class="field-error" th:if="${#fields.hasErrors('position')}" th:errors="*{position}"></p>
                        <label class="field-label" for="purpose">발급 목적</label>
                        <input class="field-input" type="text" id="purpose" th:field="*{purpose}" placeholder="예: 은행 제출용">
                        <p class="field-error" th:if="${#fields.hasErrors('purpose')}" th:errors="*{purpose}"></p>
                        <div class="btn-group" style="margin-top:20px;">
                            <button type="submit" class="btn btn-primary">신청하기</button>
                            <a th:href="@{/career}" class="btn btn-secondary">경력 조회</a>
                        </div>
                    </form>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h2>내 신청 내역</h2>
                    </div>
                    <ul style="list-style:none;padding:0;margin:0;" th:if="${myApplications != null and !myApplications.isEmpty()}">
                        <li th:each="item : ${myApplications}" style="padding:12px 0;border-bottom:1px solid var(--hrms-border);">
                            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                                <a th:href="@{/certificate/{id}/view(id=${item.id})}"
                                   th:text="|#${item.id} ${item.companyName}|"></a>
                                <span class="badge badge-pending" th:if="${item.status.name() == 'PENDING'}" th:text="${item.statusLabel}"></span>
                                <span class="badge badge-approved" th:if="${item.status.name() == 'APPROVED'}" th:text="${item.statusLabel}"></span>
                                <span class="badge badge-rejected" th:if="${item.status.name() == 'REJECTED'}" th:text="${item.statusLabel}"></span>
                            </div>
                            <p class="field-hint" style="margin:4px 0 0;" th:if="${item.status.name() == 'PENDING'}">관리자 승인 대기 중</p>
                            <p class="field-hint" style="margin:4px 0 0;color:var(--hrms-success);" th:if="${item.status.name() == 'APPROVED'}">승인 완료 · 클릭하여 인쇄</p>
                            <p class="field-hint" style="margin:4px 0 0;color:var(--hrms-danger);" th:if="${item.status.name() == 'REJECTED'}">거부됨 · 클릭하여 사유 확인</p>
                        </li>
                    </ul>
                    <p class="empty-state" th:if="${myApplications == null or myApplications.isEmpty()}">아직 신청 내역이 없습니다.</p>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
