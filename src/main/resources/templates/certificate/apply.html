<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>증명서 신청</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 40px 24px; }
        .page-layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            max-width: 1040px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .apply-card { flex: 1 1 560px; min-width: 0; }
        .history-card { flex: 0 0 320px; min-width: 280px; }
        h1 { font-size: 1.3rem; margin-bottom: 8px; }
        .desc { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        .warn { background: #fdecea; color: #c0392b; padding: 10px 12px; border-radius: 4px; font-size: 0.85rem; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px 12px; text-align: left; }
        th { background: #f8f9fa; width: 120px; }
        label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; margin-top: 12px; }
        input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .error { color: #c0392b; font-size: 0.82rem; margin-top: 6px; }
        .btn { padding: 10px 18px; border: none; border-radius: 4px; cursor: pointer; color: #fff; background: #4a90d9; font-size: 0.95rem; margin-top: 16px; }
        .btn-link { background: none; color: #4a90d9; text-decoration: none; display: inline-block; margin-top: 12px; }
        .history { list-style: none; padding: 0; margin: 0; }
        .history li { padding: 10px 0; border-bottom: 1px solid #eee; line-height: 1.5; }
        .history li:last-child { border-bottom: none; }
        .history a { color: #4a90d9; text-decoration: none; word-break: break-all; }
        .history a:hover { text-decoration: underline; }
        .status { display: block; font-size: 0.8rem; color: #888; margin-top: 4px; }
        .empty-history { color: #888; font-size: 0.9rem; margin: 8px 0 0; }

        @media (max-width: 900px) {
            .page-layout { flex-direction: column; }
            .history-card { flex: 1 1 auto; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="page-layout">
        <div class="card apply-card">
            <h1>경력증명서 신청</h1>
            <p class="desc">회사명·직위·발급 목적을 입력하면 경력증명서 뷰어에서 확인·인쇄할 수 있습니다.</p>

            <div class="warn" th:if="${dbError}" th:text="${dbError}"></div>

            <table>
                <tr><th>성명</th><td th:text="${name}"></td></tr>
                <tr><th>사용자 ID</th><td th:text="${userId}"></td></tr>
                <tr><th>입사일</th><td th:text="${hireDate}"></td></tr>
                <tr><th>재직 상태</th><td>재직중</td></tr>
            </table>

            <form th:action="@{/certificate}" th:object="${certificateApplyRequest}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <label for="companyName">회사명</label>
                <input type="text" id="companyName" th:field="*{companyName}" placeholder="예: (주)○○○○">
                <p class="error" th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}"></p>

                <label for="position">직위</label>
                <input type="text" id="position" th:field="*{position}" placeholder="예: 대리, 과장">
                <p class="error" th:if="${#fields.hasErrors('position')}" th:errors="*{position}"></p>

                <label for="purpose">발급 목적</label>
                <input type="text" id="purpose" th:field="*{purpose}" placeholder="예: 은행 제출용">
                <p class="error" th:if="${#fields.hasErrors('purpose')}" th:errors="*{purpose}"></p>

                <button type="submit" class="btn">신청하기</button>
            </form>

            <a th:href="@{/career}" class="btn-link">← 경력 조회</a>
        </div>

        <div class="card history-card">
            <h1>내 신청 내역</h1>
            <ul class="history" th:if="${myApplications != null and !myApplications.isEmpty()}">
                <li th:each="item : ${myApplications}">
                    <a th:href="@{/certificate/{id}/view(id=${item.id})}"
                       th:text="|증명서 #${item.id} - ${item.companyName} / ${item.position}|"></a>
                    <span class="status" th:text="'[' + ${item.statusLabel} + ']'"></span>
                </li>
            </ul>
            <p class="empty-history"
               th:if="${myApplications == null or myApplications.isEmpty()}">
                아직 신청 내역이 없습니다.
            </p>
        </div>
    </div>
</body>
</html>
