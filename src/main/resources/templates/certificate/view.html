<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경력증명서 · HR Portal</title>
    <link rel="stylesheet" th:href="@{/css/hrms.css}">
    <style>
        .cert-view-area { background: #e9ecef; padding: 8px 0 24px; }
        .cert-toolbar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; margin-bottom: 12px; max-width: 720px; margin-left: auto; margin-right: auto; }
        .cert-status-banner { max-width: 720px; margin: 0 auto 12px; }
        .cert-wrapper {
            max-width: 720px;
            margin: 0 auto;
        }
        .doc-no {
            font-size: 0.85rem;
            color: #444;
            margin: 0 0 8px 4px;
        }
        .certificate {
            background: #fff;
            padding: 48px 56px 64px;
            border: 1px solid #bbb;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            min-height: 780px;
            font-size: 0.92rem;
            color: #222;
        }
        .cert-title {
            text-align: center;
            font-size: 1.75rem;
            letter-spacing: 0.55rem;
            font-weight: bold;
            margin: 8px 0 36px;
        }
        .cert-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            margin-bottom: 48px;
        }
        .cert-table th,
        .cert-table td {
            border: 1px solid #bbb;
            padding: 11px 12px;
            text-align: center;
            vertical-align: middle;
            word-break: break-all;
        }
        .cert-table th {
            width: 18%;
            background: #f3f3f3;
            font-weight: 600;
        }
        .cert-table td {
            width: 32%;
            background: #fff;
        }
        .cert-table .label-wide {
            width: 18%;
        }
        .cert-table .value-wide {
            text-align: left;
            padding-left: 16px;
        }
        .cert-statement {
            margin: 72px 0 28px;
            font-size: 1rem;
            text-align: center;
        }
        .cert-date {
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 48px;
        }
        .cert-footer {
            text-align: center;
            line-height: 1.9;
        }
        .cert-org {
            font-size: 1.35rem;
            font-weight: bold;
            margin: 8px 0;
            letter-spacing: 0.05rem;
        }

        @page {
            size: A4;
            margin: 0;
        }

        @media print {
            .sidebar, .topbar, .cert-toolbar, .no-print { display: none !important; }
            .app-main { margin-left: 0; }
            .app-content { padding: 0; }
            .cert-view-area { background: #fff; padding: 0; }
            .cert-wrapper { max-width: none; }
            .certificate {
                box-shadow: none;
                border: none;
                margin: 0;
                width: 100%;
                min-height: auto;
                padding: 16mm 18mm 20mm;
                box-sizing: border-box;
                page-break-inside: avoid;
            }
            .cert-table th { background: #f3f3f3; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
    <script>
        function printCertificate() {
            var originalTitle = document.title;
            document.title = ' ';
            window.print();
            window.onafterprint = function () {
                document.title = originalTitle;
                window.onafterprint = null;
            };
        }
    </script>
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/hrms :: sidebar-user('certificate')}"></aside>
    <div class="app-main">
        <header th:replace="~{fragments/hrms :: topbar('경력증명서', 'Certificate Viewer')}"></header>
        <main class="app-content cert-view-area">
            <div class="cert-status-banner no-print">
                <div class="alert alert-warning" th:if="${cert.status.name() == 'PENDING'}">
                    <strong>승인 대기</strong> — 관리자 검토 중입니다. 승인 후 인쇄할 수 있습니다.
                </div>
                <div class="alert alert-success" th:if="${cert.status.name() == 'APPROVED'}">
                    <strong>발급 승인</strong> — 관리자가 승인했습니다. 아래 증명서를 인쇄할 수 있습니다.
                </div>
                <div class="alert alert-error" th:if="${cert.status.name() == 'REJECTED'}">
                    <strong>발급 거부</strong> — 관리자가 거부했습니다. 내용 수정 후 다시 신청해 주세요.
                </div>
            </div>
            <div class="cert-toolbar no-print">
                <button type="button" class="btn btn-primary" th:if="${cert.status.name() == 'APPROVED'}"
                        onclick="printCertificate()">인쇄</button>
                <a th:href="@{/certificate}" class="btn btn-secondary">신청 화면</a>
            </div>
            <div class="cert-wrapper">
        <p class="doc-no">문서 번호: <span th:text="${cert.documentNo}"></span></p>

        <div class="certificate">
            <h1 class="cert-title">경 력 증 명 서</h1>

            <table class="cert-table">
                <tr>
                    <th>성명</th>
                    <td th:text="${cert.name}"></td>
                    <th>생년월일</th>
                    <td th:text="${cert.birthDateDisplay}"></td>
                </tr>
                <tr>
                    <th>근무부서</th>
                    <td th:text="${cert.department}"></td>
                    <th>직급</th>
                    <td th:text="${cert.position}"></td>
                </tr>
                <tr>
                    <th>근무시작일</th>
                    <td th:text="${cert.formattedWorkStartDate}"></td>
                    <th>근무종료일</th>
                    <td th:text="${cert.workEndDateDisplay}"></td>
                </tr>
                <tr>
                    <th>근무기간</th>
                    <td th:text="${cert.workPeriod}"></td>
                    <th>용도</th>
                    <td th:text="${cert.purpose}"></td>
                </tr>
                <tr>
                    <th class="label-wide">담당업무</th>
                    <td class="value-wide" colspan="3" th:text="${cert.assignedTask}">&nbsp;</td>
                </tr>
                <tr>
                    <th class="label-wide">비고</th>
                    <td class="value-wide" colspan="3" th:text="${cert.remarks}">&nbsp;</td>
                </tr>
            </table>

            <p class="cert-statement" th:text="${footerStatement}">상기 내용이 사실임을 증명합니다.</p>
            <p class="cert-date" th:text="${formattedIssueDate}"></p>

            <div class="cert-footer">
                <div class="cert-org" th:text="${cert.issuerName}"></div>
            </div>
        </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
