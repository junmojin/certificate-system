<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경력증명서</title>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Segoe UI', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 32px 20px;
        }
        .toolbar {
            max-width: 720px;
            margin: 0 auto 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .toolbar button, .toolbar a {
            padding: 8px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.85rem;
            color: #fff;
            background: #4a90d9;
        }
        .toolbar a.secondary { background: #6c757d; }

        .cert-wrapper {
            max-width: 720px;
            margin: 0 auto;
        }
        .doc-no {
            font-size: 0.85rem;
            color: #444;
            margin: 0 0 8px 4px;
        }
        .certificate {
            background: #fff;
            padding: 48px 56px 64px;
            border: 1px solid #bbb;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            min-height: 780px;
            font-size: 0.92rem;
            color: #222;
        }
        .cert-title {
            text-align: center;
            font-size: 1.75rem;
            letter-spacing: 0.55rem;
            font-weight: bold;
            margin: 8px 0 36px;
        }
        .cert-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            margin-bottom: 48px;
        }
        .cert-table th,
        .cert-table td {
            border: 1px solid #bbb;
            padding: 11px 12px;
            text-align: center;
            vertical-align: middle;
            word-break: break-all;
        }
        .cert-table th {
            width: 18%;
            background: #f3f3f3;
            font-weight: 600;
        }
        .cert-table td {
            width: 32%;
            background: #fff;
        }
        .cert-table .label-wide {
            width: 18%;
        }
        .cert-table .value-wide {
            text-align: left;
            padding-left: 16px;
        }
        .cert-statement {
            margin: 72px 0 28px;
            font-size: 1rem;
            text-align: center;
        }
        .cert-date {
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 48px;
        }
        .cert-footer {
            text-align: center;
            line-height: 1.9;
        }
        .cert-address {
            font-size: 0.88rem;
            color: #444;
        }
        .cert-org {
            font-size: 1.35rem;
            font-weight: bold;
            margin: 8px 0;
            letter-spacing: 0.05rem;
        }
        .cert-representative {
            font-size: 0.95rem;
        }
        .screen-only {
            margin-top: 16px;
            text-align: right;
            font-size: 0.82rem;
            color: #666;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.78rem;
            background: #fff3cd;
            color: #856404;
            margin-left: 6px;
        }
        .status-badge.approved { background: #e8f5e9; color: #2e7d32; }
        .status-badge.rejected { background: #fdecea; color: #c0392b; }

        @page {
            size: A4;
            margin: 0;
        }

        @media print {
            html, body {
                background: #fff;
                margin: 0;
                padding: 0;
            }
            .toolbar { display: none !important; }
            .screen-only { display: none !important; }
            .cert-wrapper { max-width: none; }
            .certificate {
                box-shadow: none;
                border: none;
                margin: 0;
                width: 100%;
                min-height: auto;
                padding: 16mm 18mm 20mm;
                box-sizing: border-box;
                page-break-inside: avoid;
            }
            .cert-table th { background: #f3f3f3; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
    <script>
        function printCertificate() {
            var originalTitle = document.title;
            document.title = ' ';
            window.print();
            window.onafterprint = function () {
                document.title = originalTitle;
                window.onafterprint = null;
            };
        }
    </script>
</head>
<body>
    <div class="toolbar no-print">
        <button type="button" onclick="printCertificate()">인쇄</button>
        <a th:href="@{/certificate}" class="secondary">신청 화면</a>
        <a th:href="@{/career}" class="secondary">경력 조회</a>
        <a th:href="@{/home}" class="secondary">메인</a>
    </div>

    <div class="cert-wrapper">
        <p class="doc-no">문서 번호: <span th:text="${cert.documentNo}"></span></p>

        <div class="certificate">
            <h1 class="cert-title">경 력 증 명 서</h1>

            <table class="cert-table">
                <tr>
                    <th>성명</th>
                    <td th:text="${cert.name}"></td>
                    <th>생년월일</th>
                    <td th:text="${cert.birthDateDisplay}"></td>
                </tr>
                <tr>
                    <th>근무부서</th>
                    <td th:text="${cert.department}"></td>
                    <th>직급</th>
                    <td th:text="${cert.position}"></td>
                </tr>
                <tr>
                    <th>근무시작일</th>
                    <td th:text="${cert.formattedWorkStartDate}"></td>
                    <th>근무종료일</th>
                    <td th:text="${cert.workEndDateDisplay}"></td>
                </tr>
                <tr>
                    <th>근무기간</th>
                    <td th:text="${cert.workPeriod}"></td>
                    <th>용도</th>
                    <td th:text="${cert.purpose}"></td>
                </tr>
                <tr>
                    <th class="label-wide">담당업무</th>
                    <td class="value-wide" colspan="3" th:text="${cert.assignedTask}">&nbsp;</td>
                </tr>
                <tr>
                    <th class="label-wide">비고</th>
                    <td class="value-wide" colspan="3" th:text="${cert.remarks}">&nbsp;</td>
                </tr>
            </table>

            <p class="cert-statement" th:text="${footerStatement}">상기 내용이 사실임을 증명합니다.</p>
            <p class="cert-date" th:text="${formattedIssueDate}"></p>

            <div class="cert-footer">
                <div class="cert-address" th:text="${cert.companyAddress}"></div>
                <div class="cert-org" th:text="${cert.issuerName}"></div>
                <div class="cert-representative" th:text="${cert.representativeName}"></div>
            </div>

            <div class="screen-only no-print">
                신청 상태:
                <span th:text="${cert.status.label}"></span>
                <span class="status-badge" th:if="${cert.status.name() == 'PENDING'}">승인 대기</span>
                <span class="status-badge approved" th:if="${cert.status.name() == 'APPROVED'}">발급 승인</span>
                <span class="status-badge rejected" th:if="${cert.status.name() == 'REJECTED'}">발급 거부</span>
            </div>
        </div>
    </div>
</body>
</html>
