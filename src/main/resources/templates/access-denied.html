<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hrms :: head('접근 거부')}"></head>
<body class="login-page">
    <div class="login-brand" style="flex:0.6;">
        <h1>Access Denied</h1>
        <p>현재 계정으로는 해당 메뉴에 접근할 수 없습니다.</p>
    </div>
    <div class="login-panel" style="flex:1;">
        <div class="login-box">
            <h2>접근 권한 없음</h2>
            <p class="sub">USER / ADMIN 계정에 맞는 메뉴를 이용해 주세요.</p>
            <a th:href="@{/login}" class="btn btn-primary" style="width:100%;margin-top:16px;">로그인 화면으로</a>
        </div>
    </div>
</body>
</html>
