<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hrms :: head('증명서 신청 상세')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/hrms :: sidebar-admin('certificates')}"></aside>
    <div class="app-main">
        <header th:replace="~{fragments/hrms :: topbar('증명서 신청 상세', 'Application Review')}"></header>
        <main class="app-content">
            <div class="card content-narrow">
                <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
                <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
                <table class="info-table">
                    <tr><th>신청번호</th><td th:text="${certApplication.id}"></td></tr>
                    <tr><th>사용자 ID</th><td th:text="${certApplication.applicantUserId}"></td></tr>
                    <tr><th>성명</th><td th:text="${certApplication.applicantName}"></td></tr>
                    <tr><th>입사일</th><td th:text="${certApplication.hireDate}"></td></tr>
                    <tr><th>회사명</th><td th:text="${certApplication.companyName}"></td></tr>
                    <tr><th>직위</th><td th:text="${certApplication.position}"></td></tr>
                    <tr><th>발급 목적</th><td th:text="${certApplication.purpose}"></td></tr>
                    <tr>
                        <th>처리 상태</th>
                        <td>
                            <span class="badge badge-pending" th:if="${certApplication.status.name() == 'PENDING'}" th:text="${certApplication.statusLabel}"></span>
                            <span class="badge badge-approved" th:if="${certApplication.status.name() == 'APPROVED'}" th:text="${certApplication.statusLabel}"></span>
                            <span class="badge badge-rejected" th:if="${certApplication.status.name() == 'REJECTED'}" th:text="${certApplication.statusLabel}"></span>
                        </td>
                    </tr>
                    <tr><th>신청일</th><td th:text="${#temporals.format(certApplication.appliedAt, 'yyyy-MM-dd HH:mm')}"></td></tr>
                </table>
                <div class="alert alert-warning" th:if="${certApplication.canReview}">
                    승인 대기 상태입니다. 발급 승인 또는 발급 거부를 선택하세요.
                </div>
                <div class="btn-group">
                    <a th:href="@{/admin/certificates}" class="btn btn-secondary">목록</a>
                    <form th:if="${certApplication.canReview}"
                          th:action="@{/admin/certificates/{id}/approve(id=${certApplication.id})}" method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-success" onclick="return confirm('발급 승인하시겠습니까?');">발급 승인</button>
                    </form>
                    <form th:if="${certApplication.canReview}"
                          th:action="@{/admin/certificates/{id}/reject(id=${certApplication.id})}" method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-danger" onclick="return confirm('발급 거부하시겠습니까?');">발급 거부</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
