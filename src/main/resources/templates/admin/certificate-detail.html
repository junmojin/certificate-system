<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>증명서 신청 상세</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 32px 20px; }
        .card { background: #fff; max-width: 720px; margin: 0 auto; padding: 32px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        h1 { font-size: 1.3rem; margin: 0 0 8px; }
        .desc { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
        th, td { border: 1px solid #ddd; padding: 10px 12px; text-align: left; font-size: 0.92rem; }
        th { background: #f8f9fa; width: 140px; }
        .badge {
            display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.82rem;
        }
        .badge.pending { background: #fff3cd; color: #856404; }
        .badge.approved { background: #e8f5e9; color: #2e7d32; }
        .badge.rejected { background: #fdecea; color: #c0392b; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            padding: 9px 16px; border: none; border-radius: 4px; cursor: pointer;
            text-decoration: none; font-size: 0.9rem; color: #fff;
        }
        .btn-approve { background: #2e7d32; }
        .btn-reject { background: #e74c3c; }
        .btn-secondary { background: #6c757d; }
        .message { padding: 10px 12px; border-radius: 4px; margin-bottom: 16px; font-size: 0.88rem; }
        .message.error { background: #fdecea; color: #c0392b; }
        .message.success { background: #e8f5e9; color: #2e7d32; }
        .review-box { background: #f8f9fa; padding: 16px; border-radius: 6px; margin-bottom: 20px; }
        .review-box p { margin: 0; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>증명서 신청 상세</h1>
        <p class="desc">신청 번호 #<span th:text="${application.id}"></span></p>

        <div class="message error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="message success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <table>
            <tr><th>사용자 ID</th><td th:text="${application.applicantUserId}"></td></tr>
            <tr><th>성명</th><td th:text="${application.applicantName}"></td></tr>
            <tr><th>입사일</th><td th:text="${application.hireDate}"></td></tr>
            <tr><th>회사명</th><td th:text="${application.companyName}"></td></tr>
            <tr><th>직위</th><td th:text="${application.position}"></td></tr>
            <tr><th>발급 목적</th><td th:text="${application.purpose}"></td></tr>
            <tr>
                <th>처리 상태</th>
                <td>
                    <span class="badge pending" th:if="${application.status.name() == 'PENDING'}"
                          th:text="${application.statusLabel}"></span>
                    <span class="badge approved" th:if="${application.status.name() == 'APPROVED'}"
                          th:text="${application.statusLabel}"></span>
                    <span class="badge rejected" th:if="${application.status.name() == 'REJECTED'}"
                          th:text="${application.statusLabel}"></span>
                    <span class="badge" th:if="${application.status.name() == 'ISSUED'}"
                          th:text="${application.statusLabel}"></span>
                </td>
            </tr>
            <tr><th>신청일</th><td th:text="${#temporals.format(application.appliedAt, 'yyyy-MM-dd HH:mm')}"></td></tr>
            <tr><th>최종 수정</th><td th:text="${#temporals.format(application.updatedAt, 'yyyy-MM-dd HH:mm')}"></td></tr>
        </table>

        <div class="review-box" th:if="${application.canReview}">
            <p>승인 대기 상태입니다. 발급 승인 또는 발급 거부를 선택하세요.</p>
        </div>

        <div class="actions">
            <a th:href="@{/admin/certificates}" class="btn btn-secondary">목록</a>
            <form th:if="${application.canReview}"
                  th:action="@{/admin/certificates/{id}/approve(id=${application.id})}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-approve"
                        onclick="return confirm('발급 승인하시겠습니까?');">발급 승인</button>
            </form>
            <form th:if="${application.canReview}"
                  th:action="@{/admin/certificates/{id}/reject(id=${application.id})}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-reject"
                        onclick="return confirm('발급 거부하시겠습니까?');">발급 거부</button>
            </form>
        </div>
    </div>
</body>
</html>
