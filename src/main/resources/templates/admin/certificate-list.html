<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hrms :: head('증명서 신청 조회')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/hrms :: sidebar-admin('certificates')}"></aside>
    <div class="app-main">
        <header th:replace="~{fragments/hrms :: topbar('증명서 신청 조회', 'Certificate Request Management')}"></header>
        <main class="app-content">
            <div class="card content-wide">
                <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
                <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
                <form class="filter-bar" th:action="@{/admin/certificates}" method="get">
                    <label for="userId">사용자 계정</label>
                    <select class="field-input" style="width:auto;min-width:160px;" id="userId" name="userId">
                        <option value="" th:selected="${selectedUserId == ''}">전체 사용자</option>
                        <option th:each="uid : ${applicantUserIds}" th:value="${uid}" th:text="${uid}"
                                th:selected="${selectedUserId == uid}"></option>
                    </select>
                    <button type="submit" class="btn btn-primary">조회</button>
                </form>
                <table class="data-table" th:if="${applications != null and !applications.isEmpty()}">
                    <thead>
                        <tr>
                            <th>신청번호</th>
                            <th>사용자 ID</th>
                            <th>성명</th>
                            <th>회사명</th>
                            <th>직위</th>
                            <th>상태</th>
                            <th>신청일</th>
                            <th>상세</th>
                            <th>처리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="app : ${applications}">
                            <td th:text="${app.id}"></td>
                            <td th:text="${app.applicantUserId}"></td>
                            <td th:text="${app.applicantName}"></td>
                            <td th:text="${app.companyName}"></td>
                            <td th:text="${app.position}"></td>
                            <td>
                                <span class="badge badge-pending" th:if="${app.status.name() == 'PENDING'}" th:text="${app.statusLabel}"></span>
                                <span class="badge badge-approved" th:if="${app.status.name() == 'APPROVED'}" th:text="${app.statusLabel}"></span>
                                <span class="badge badge-rejected" th:if="${app.status.name() == 'REJECTED'}" th:text="${app.statusLabel}"></span>
                                <span class="badge badge-issued" th:if="${app.status.name() == 'ISSUED'}" th:text="${app.statusLabel}"></span>
                            </td>
                            <td th:text="${#temporals.format(app.appliedAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td><a th:href="@{/admin/certificates/{id}(id=${app.id})}">보기</a></td>
                            <td>
                                <div class="btn-group" th:if="${app.status.name() == 'PENDING'}">
                                    <form th:action="@{/admin/certificates/{id}/approve(id=${app.id})}" method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <input type="hidden" name="returnTo" value="list"/>
                                        <input type="hidden" name="userId" th:value="${selectedUserId}" th:if="${selectedUserId != ''}"/>
                                        <button type="submit" class="btn btn-success" style="padding:6px 10px;font-size:0.8rem;"
                                                onclick="return confirm('발급 승인하시겠습니까?');">승인</button>
                                    </form>
                                    <form th:action="@{/admin/certificates/{id}/reject(id=${app.id})}" method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <input type="hidden" name="returnTo" value="list"/>
                                        <input type="hidden" name="userId" th:value="${selectedUserId}" th:if="${selectedUserId != ''}"/>
                                        <button type="submit" class="btn btn-danger" style="padding:6px 10px;font-size:0.8rem;"
                                                onclick="return confirm('발급 거부하시겠습니까?');">거부</button>
                                    </form>
                                </div>
                                <span th:if="${app.status.name() != 'PENDING'}" style="color:var(--hrms-text-muted);font-size:0.82rem;">처리완료</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <p class="empty-state" th:if="${applications == null or applications.isEmpty()}">신청 내역이 없습니다.</p>
            </div>
        </main>
    </div>
</div>
</body>
</html>
