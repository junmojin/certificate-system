<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hrms :: head('관리자 홈')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/hrms :: sidebar-admin('home')}"></aside>
    <div class="app-main">
        <header th:replace="~{fragments/hrms :: topbar('관리자 대시보드', 'HR Administration Console')}"></header>
        <main class="app-content">
            <div class="dashboard-grid">
                <div class="stat-card">
                    <div class="label">관리자</div>
                    <div class="value" th:text="${name}"></div>
                </div>
                <div class="stat-card">
                    <div class="label">ID</div>
                    <div class="value" th:text="${userId}"></div>
                </div>
                <div class="stat-card">
                    <div class="label">권한</div>
                    <div class="value">ADMIN</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div>
                        <h2>관리자 메뉴</h2>
                        <p class="card-desc">증명서 승인·거부 및 시스템 관리 기능입니다.</p>
                    </div>
                </div>
                <ul class="menu-grid">
                    <li>
                        <a th:href="@{/admin/certificates}">
                            <span class="menu-icon">📋</span>
                            <span class="menu-text">
                                <strong>증명서 신청 조회</strong>
                                <span>발급 승인 / 거부 처리</span>
                            </span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/admin/activity-logs}">
                            <span class="menu-icon">📊</span>
                            <span class="menu-text">
                                <strong>사용자 행위 추적</strong>
                                <span>활동 로그 조회</span>
                            </span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/boards}">
                            <span class="menu-icon">💬</span>
                            <span class="menu-text">
                                <strong>건의 게시판</strong>
                                <span>직원 건의사항 확인</span>
                            </span>
                        </a>
                    </li>
                </ul>
            </div>
        </main>
    </div>
</div>
</body>
</html>
