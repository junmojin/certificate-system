<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hrms :: head('행위 추적')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/hrms :: sidebar-admin('logs')}"></aside>
    <div class="app-main">
        <header th:replace="~{fragments/hrms :: topbar('사용자 행위 추적', 'Activity Audit Log')}"></header>
        <main class="app-content">
            <div class="card content-wide">
                <p class="card-desc">사용자 ID 기준 메뉴 접근·주요 행위 기록 (형식: 시간 / 사용자 ID / 접근 메뉴명)</p>
                <form class="filter-bar" th:action="@{/admin/activity-logs}" method="get">
                    <label for="userId">사용자 계정</label>
                    <select class="field-input" style="width:auto;min-width:160px;" id="userId" name="userId">
                        <option value="" th:selected="${selectedUserId == ''}">전체 사용자</option>
                        <option th:each="uid : ${userIds}" th:value="${uid}" th:text="${uid}"
                                th:selected="${selectedUserId == uid}"></option>
                    </select>
                    <label for="logDate">조회 일자</label>
                    <input class="field-input" type="date" id="logDate" name="logDate"
                           style="width:auto;min-width:160px;" th:value="${selectedLogDate}">
                    <button type="submit" class="btn btn-primary">조회</button>
                </form>
                <table class="data-table" th:if="${logs != null and !logs.isEmpty()}">
                    <thead>
                        <tr>
                            <th>시간</th>
                            <th>사용자 ID</th>
                            <th>접근 메뉴명</th>
                            <th>로그</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="log : ${logs}">
                            <td th:text="${#temporals.format(log.occurredAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                            <td th:text="${log.userId}"></td>
                            <td th:text="${log.menuName}"></td>
                            <td th:text="${log.formattedLog}"></td>
                        </tr>
                    </tbody>
                </table>
                <p class="empty-state" th:if="${logs == null or logs.isEmpty()}"
                   th:text="${hasDateFilter} ? '선택한 일자에 해당하는 행위 기록이 없습니다.' : '조회된 행위 기록이 없습니다.'"></p>
                <div class="btn-group" style="margin-top:16px;">
                    <a th:href="@{/admin/home}" class="btn btn-secondary">관리자 홈</a>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
