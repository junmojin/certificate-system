<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hrms :: head('건의 글 작성')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="${isAdmin} ? ~{fragments/hrms :: sidebar-admin('board')} : ~{fragments/hrms :: sidebar-user('board')}"></aside>
    <div class="app-main">
        <header th:replace="~{fragments/hrms :: topbar('건의 글 작성', 'New Suggestion')}"></header>
        <main class="app-content">
            <div class="card content-narrow">
                <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
                <form th:action="@{/boards}" th:object="${boardWriteRequest}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <label class="field-label" for="title">제목</label>
                    <input class="field-input" type="text" id="title" th:field="*{title}" maxlength="200">
                    <p class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
                    <label class="field-label" for="content">본문</label>
                    <textarea class="field-input" id="content" th:field="*{content}" maxlength="5000"></textarea>
                    <p class="field-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
                    <label class="field-label" for="attachment">첨부파일 (선택)</label>
                    <input class="field-input" type="file" id="attachment" name="attachment"
                           accept=".pdf,.png,.jpg,.jpeg,.gif,.txt,.doc,.docx,.xls,.xlsx,.hwp,.zip">
                    <p class="field-hint">pdf, 이미지, 문서, hwp, zip · 최대 5MB</p>
                    <div class="btn-group" style="margin-top:20px;">
                        <button type="submit" class="btn btn-primary">게시글 등록</button>
                        <a th:href="@{/boards}" class="btn btn-secondary">목록</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</div>
</body>
</html>
