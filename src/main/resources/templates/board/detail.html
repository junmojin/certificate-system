<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${board.title}">건의 글</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 32px 20px; }
        .container { max-width: 860px; margin: 0 auto; }
        .card { background: #fff; padding: 28px 32px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .header { border-bottom: 1px solid #eee; padding-bottom: 16px; margin-bottom: 20px; }
        h1 { font-size: 1.4rem; margin: 0 0 12px; color: #222; }
        .meta { color: #666; font-size: 0.88rem; line-height: 1.8; }
        .content {
            white-space: pre-wrap; line-height: 1.7; color: #333; min-height: 120px;
            font-size: 0.95rem;
        }
        .attachment {
            margin-top: 24px; padding: 14px 16px; background: #f8f9fa; border-radius: 6px;
            font-size: 0.9rem;
        }
        .attachment a { color: #4a90d9; text-decoration: none; font-weight: 500; }
        .attachment a:hover { text-decoration: underline; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 24px; }
        .btn {
            display: inline-block; padding: 8px 14px; border-radius: 4px; text-decoration: none;
            font-size: 0.88rem; border: none; cursor: pointer;
        }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .message { padding: 10px 12px; border-radius: 4px; margin-bottom: 16px; font-size: 0.88rem; background: #fdecea; color: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="message" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="header">
                <h1 th:text="${board.title}"></h1>
                <div class="meta">
                    <div>작성자: <span th:text="${board.authorName}"></span> (<span th:text="${board.authorId}"></span>)</div>
                    <div>
                        작성일: <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        · 조회: <span th:text="${board.viewCount}"></span>
                    </div>
                </div>
            </div>

            <div class="content" th:text="${board.content}"></div>

            <div class="attachment" th:if="${board.hasAttachment}">
                첨부파일:
                <a th:href="@{/boards/{id}/attachment(id=${board.id})}" th:text="${board.originalFileName}"></a>
                <span th:if="${board.fileSize != null}"
                      th:text="' (' + ${#numbers.formatInteger(board.fileSize / 1024, 0, 'COMMA')} + ' KB)'"></span>
            </div>

            <div class="actions">
                <a th:href="@{/boards}" class="btn btn-secondary">목록</a>
                <form th:if="${isAdmin or currentUserId == board.authorId}"
                      th:action="@{/boards/{id}/delete(id=${board.id})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('게시글을 삭제하시겠습니까?');">게시글 삭제</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
