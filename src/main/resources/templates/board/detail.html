<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hrms :: head(${board.title})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="${isAdmin} ? ~{fragments/hrms :: sidebar-admin('board')} : ~{fragments/hrms :: sidebar-user('board')}"></aside>
    <div class="app-main">
        <header th:replace="~{fragments/hrms :: topbar('건의 상세', 'Suggestion Detail')}"></header>
        <main class="app-content">
            <div class="card content-narrow">
                <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
                <div class="card-header" style="border-bottom:1px solid var(--hrms-border);padding-bottom:16px;">
                    <h2 th:text="${board.title}"></h2>
                    <p class="card-desc">
                        <span th:text="${board.authorName}"></span>
                        (<span th:text="${board.authorId}"></span>)
                        · <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        · 조회 <span th:text="${board.viewCount}"></span>
                    </p>
                </div>
                <div style="white-space:pre-wrap;line-height:1.7;padding:20px 0;min-height:120px;" th:text="${board.content}"></div>
                <div class="alert alert-info" th:if="${board.hasAttachment}">
                    첨부:
                    <a th:href="@{/boards/{id}/attachment(id=${board.id})}" th:text="${board.originalFileName}"></a>
                </div>
                <div class="btn-group">
                    <a th:href="@{/boards}" class="btn btn-secondary">목록</a>
                    <form th:if="${isAdmin or currentUserId == board.authorId}"
                          th:action="@{/boards/{id}/delete(id=${board.id})}" method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-danger"
                                onclick="return confirm('게시글을 삭제하시겠습니까?');">삭제</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
