<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hrms :: head('건의 게시판')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="${isAdmin} ? ~{fragments/hrms :: sidebar-admin('board')} : ~{fragments/hrms :: sidebar-user('board')}"></aside>
    <div class="app-main">
        <header th:replace="~{fragments/hrms :: topbar('건의 게시판', 'Suggestion Board')}"></header>
        <main class="app-content">
            <div class="card content-wide">
                <div class="card-header">
                    <div>
                        <h2>건의 목록</h2>
                        <p class="card-desc">직원·관리자가 함께 이용하는 건의 게시판입니다.</p>
                    </div>
                    <div class="btn-group">
                        <a th:href="@{/boards/new}" class="btn btn-primary">글쓰기</a>
                    </div>
                </div>
                <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
                <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
                <table class="data-table" th:if="${boards != null and !boards.isEmpty()}">
                    <thead>
                        <tr>
                            <th>번호</th>
                            <th>제목</th>
                            <th>작성자</th>
                            <th>첨부</th>
                            <th>조회</th>
                            <th>작성일</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="board : ${boards}">
                            <td th:text="${board.id}"></td>
                            <td><a th:href="@{/boards/{id}(id=${board.id})}" th:text="${board.title}"></a></td>
                            <td th:text="${board.authorName}"></td>
                            <td th:text="${board.hasAttachment} ? '📎' : '-'"></td>
                            <td th:text="${board.viewCount}"></td>
                            <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        </tr>
                    </tbody>
                </table>
                <p class="empty-state" th:if="${boards == null or boards.isEmpty()}">등록된 건의 글이 없습니다.</p>
            </div>
        </main>
    </div>
</div>
</body>
</html>
