spring.application.name=certificate-system

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/certificate_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false

# Multipart (건의 게시판 첨부파일)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# 건의 게시판 첨부파일 저장
app.board.upload-dir=uploads/board
app.board.max-file-size=5242880

# SmartCert / HTML5 PDF 뷰어 (sga_np는 WAR 밖 고정 경로)
app.smart-cert.base-dir=C:/app/sga_np
app.smart-cert.pdf-dir=C:/app/sga_np/gs_pdf
app.smart-cert.trust-certificate-xml=C:/app/sga_np/TrustCertificate.xml
app.smart-cert.viewer-barcode=y
app.smart-cert.viewer-voiceye=n
app.smart-cert.barcode-voiceye-dir=C:/app/sga_np/barcode/voiceye
app.smart-cert.barcode-data-path=C:/app/sga_np/test.html
app.smart-cert.viewer-resource-folder=

# 에러 원인 확인용 (화면/로그)
server.error.include-message=always
server.error.include-exception=true
